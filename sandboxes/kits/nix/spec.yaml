schemaVersion: "1"
kind: mixin
name: nix
displayName: Nix
description: Network allowlist for Nix substitutes and common source fetches

network:
  allowedDomains:
    - "cache.nixos.org:443"
    - "*.cachix.org:443"
    - "tarballs.nixos.org:443"
    - "github.com:443"
    - "ftpmirror.gnu.org:443"
    - "download.savannah.gnu.org:443"
